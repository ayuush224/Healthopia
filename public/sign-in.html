<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Healthopia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="auth-page">
  <div class="auth-shell">
    <section class="auth-hero">
      <div class="auth-brand">
        <img class="auth-brand__logo" src="/images/healthopia_logo_nobg.png" alt="Healthopia logo">
        <span class="auth-brand__wordmark">Healthopia</span>
      </div>
      <h1>Return to your living wellness sanctuary.</h1>
      <p class="auth-copy">
        Stay close to your communities, your reflections, and your daily health rhythm in one calm space.
      </p>
    </section>

    <section class="auth-card">
      <div class="auth-card__header">
        <h2>Sign in</h2>
        <p>Use your email to continue into the app.</p>
      </div>

      <form id="sign-in-form" class="stack-form">
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" placeholder="example@gmail.com" autocomplete="email" required>
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        </label>

        <div id="auth-message" class="inline-message is-hidden" role="alert"></div>

        <button class="button-primary button-primary--full" type="submit">Continue</button>
      </form>

      <p class="auth-footer">
        New here?
        <a href="/register">Create your account</a>
      </p>
    </section>
  </div>

  <script src="/js/runtime-config.js"></script>
  <script type="module" src="/js/sign-in.js"></script>
</body>
</html>
